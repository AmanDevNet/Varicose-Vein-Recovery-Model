services:
  - type: web
    name: varicose-vein-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_VERSION
        value: 1.0.0
      - key: ALLOWED_ORIGINS
        value: "*" # We'll refine this later with HuggingFace URL
